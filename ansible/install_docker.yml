---
- name: Install Docker and Docker compose Stack
  hosts: all
  become: true

  tasks:
    - name: Wait for cloud-init to finish clean setup
      ansible.builtin.command: cloud-init status --wait
      changed_when: false

    - name: Force purge and re-initialize apt cache
      ansible.builtin.apt:
        update_cache: true
        force_apt_get: true

    - name: Enable universe repository
      ansible.builtin.apt_repository:
        repo: "deb http://archive.ubuntu.com/ubuntu jammy universe"
        state: present

    - name: Update apt cache for universe
      ansible.builtin.apt:
        update_cache: true

    - name: Install required system dependencies
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - software-properties-common
          - python3-pip
        state: present

    - name: Create directory for Docker apt keyring
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG apt key safely
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker Repository to APT sources
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu jammy stable"
        state: present
        filename: docker

    - name: Install Docker Engine and CLI binaries
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Ensure Docker service is running and enabled on boot
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Install Python Docker SDK required by Ansible Docker modules
      ansible.builtin.pip:
        name: docker
        state: present
