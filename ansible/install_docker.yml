---
- name: Install Docker using official script
  hosts: all
  become: true
  gather_facts: yes

  tasks:
    - name: Wait for cloud-init to finish (prevents apt locks)
      ansible.builtin.command: cloud-init status --wait
      changed_when: false

    - name: Run Docker official installation script
      ansible.builtin.shell: |
        curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
        sh /tmp/get-docker.sh
      args:
        creates: /usr/bin/docker
      environment:
        CHANNEL: stable

    - name: Ensure Docker service is running and enabled
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Add ubuntu user to docker group (optional, for convenience)
      ansible.builtin.user:
        name: ubuntu
        groups: docker
        append: yes
