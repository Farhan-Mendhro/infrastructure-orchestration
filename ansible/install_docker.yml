---
- name: Install Docker and Docker compose Stack
  hosts: all
  become: true

  tasks:
    # CHANGE 1: Added raw cache initialization so fresh servers can read repositories
    - name: Initialize empty apt cache
      ansible.builtin.apt:
        update_cache: true
        force_apt_get: true

    - name: Enable universe repository
      ansible.builtin.apt_repository:
        repo: "deb http://archive.ubuntu.com/ubuntu {{ ansible_distribution_release }} universe"
        state: present

    # CHANGE 2: Isolated cache update to force indexing of newly unlocked universe packages
    - name: Update apt cache after enabling universe
      ansible.builtin.apt:
        update_cache: true

    # FIX: This will now successfully find python3-pip
    - name: Install required system dependencies
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - software-properties-common
          - python3-pip
        state: present

    # CHANGE 3: Modernized key directory creation (replaces deprecated apt_key)
    - name: Create directory for Docker apt keyring
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    # CHANGE 4: Securely downloads the GPG key natively
    - name: Add Docker GPG apt key safely
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    # CHANGE 5: Dynamically fetches repository using system facts instead of hardcoded 'focal'
    - name: Add Docker Repository to APT sources dynamically
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Install Docker Engine and CLI binaries
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Ensure Docker service is running and enabled on boot
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Install Python Docker SDK required by Ansible Docker modules
      ansible.builtin.pip:
        name: docker
        state: present
