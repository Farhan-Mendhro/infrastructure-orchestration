---
# Installs Docker Engine on all instances using the official convenience script
- name: Install Docker using official script
  hosts: all
  become: true
  gather_facts: true

  tasks:
    # Blocks execution until cloud-init finishes post-provisioning boot routines to avoid apt lock errors
    - name: Wait for cloud-init
      ansible.builtin.command: cloud-init status --wait
      changed_when: false

    # Installs curl and ca-certificates required to pull and validate external HTTPS scripts
    - name: Install required prereqs
      ansible.builtin.apt:
        name:
          - curl
          - ca-certificates
        state: present
        update_cache: true

    # Downloads and runs the official Docker script only if the docker binary does not exist
    - name: Run Docker installation script (force run even in check mode)
      ansible.builtin.shell: |
        set -e
        curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
        sh /tmp/get-docker.sh
      args:
        creates: /usr/bin/docker
      check_mode: false
      register: docker_install

    # Outputs complete execution logs if the shell installation script fails
    - name: Debug installation output if failed
      ansible.builtin.debug:
        var: docker_install
      when: docker_install is failed

    # Verifies that the docker command is globally reachable on the system path
    - name: Ensure Docker is installed
      ansible.builtin.command: which docker
      changed_when: false

    # Configures systemd to start the Docker daemon now and on every subsequent system boot
    - name: Start and enable Docker service
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true
