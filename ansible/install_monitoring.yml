---
# OBSERVABILITY ORCHESTRATION: Manages containerized monitoring agents across worker and master nodes
- name: Deploy Centralized Prometheus and Grafana Stack through Docker
  hosts: all
  become: true

  tasks:
    # RECOVERY/IDEMPOTENCY: Cleans up old container states to avoid 'Name already in use' deployment crashes
    - name: Remove existing node-exporter container if present
      ansible.builtin.command: docker rm -f node-exporter
      failed_when: false
      changed_when: false

    # NETWORKING PRIMITIVE: Bypasses Docker's virtual network bridge isolation.
    # Mappings run directly on the host's system interface to scrape raw hardware metrics.
    - name: Launch Node exporter container on all hosts
      ansible.builtin.command: >
        docker run -d --name node-exporter --restart always
        --network host
        prom/node-exporter:latest
      changed_when: false

    # DYNAMIC NODE SELECTION: 'ansible_play_batch[-1]' targets the final server index in your runtime array.
    # This keeps your configuration dynamic, isolating the engine strictly to Node 5 without hardcoded IPs.
    - name: Remove existing prometheus container if present
      ansible.builtin.command: docker rm -f prometheus
      failed_when: false
      changed_when: false
      when: inventory_hostname == ansible_play_batch[-1]

    - name: Remove existing grafana container if present
      ansible.builtin.command: docker rm -f grafana
      failed_when: false
      changed_when: false
      when: inventory_hostname == ansible_play_batch[-1]

    - name: Create configuration directory
      ansible.builtin.file:
        path: /etc/prometheus
        state: directory
        mode: "0755"
      when: inventory_hostname == ansible_play_batch[-1]

    # JINJA2 TEMPLATING: Automatically extracts runtime IP addresses of your first 4 nodes (0 to 3)
    # to feed them directly into Prometheus as active metrics scrape targets.
    - name: Generate centralized prometheus.yml config
      ansible.builtin.copy:
        dest: /etc/prometheus/prometheus.yml
        mode: "0644"
        content: |
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: 'production_app_cluster'
              static_configs:
                - targets:
                    - '{{ ansible_play_batch[0] }}:9100'
                    - '{{ ansible_play_batch[1] }}:9100'
                    - '{{ ansible_play_batch[2] }}:9100'
                    - '{{ ansible_play_batch[3] }}:9100'
      when: inventory_hostname == ansible_play_batch[-1]

    # VOLUME MOUNT: Mounts the configuration file generated above from the host system into the container filesystem
    - name: Launch Prometheus
      ansible.builtin.command: >
        docker run -d --name prometheus --restart always -p 9090:9090
        -v /etc/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
        prom/prometheus:latest
      when: inventory_hostname == ansible_play_batch[-1]
      changed_when: false

    # WEB DASHBOARD INGRESS: Exposes port 3000 to allow public web browser traffic into the dashboard visualization UI
    - name: Launch Grafana
      ansible.builtin.command: >
        docker run -d --name grafana --restart always -p 3000:3000
        grafana/grafana:latest
      when: inventory_hostname == ansible_play_batch[-1]
      changed_when: false
